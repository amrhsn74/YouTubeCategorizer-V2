<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">Total Videos</div>
    <div class="stat-value gradient-text">{{ stats.totalVideos }}</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Categories</div>
    <div class="stat-value gradient-text">{{ stats.totalCategories }}</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Channels</div>
    <div class="stat-value gradient-text">{{ stats.totalChannels }}</div>
  </div>
</div>
