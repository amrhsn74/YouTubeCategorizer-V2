<div class="video-card">
  <div class="video-thumb" [ngClass]="colorClass">{{ emoji }}</div>

  <div class="video-body">
    <div class="video-title">{{ video.title }}</div>
    <div>
      <span class="channel-chip" [ngStyle]="channelColorStyle">◆ {{ video.channelName }}</span>
    </div>
    <div class="video-desc">
      {{ video.description || 'No description available.' }}
    </div>
  </div>

  <div class="video-meta">
    <span class="cat-badge-sm" [ngClass]="colorClass">
      {{ video.categoryLabel }}
    </span>
  </div>
</div>
